<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ocarina of Time — Play the Songs</title>
<meta name="description" content="A playable Ocarina of Time web app: perform the songs of Hyrule with mouse, touch, or keyboard, with sheet music for every melody." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <header class="site-head">
    <div class="triforce" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
    <h1>Ocarina of Time</h1>
    <p class="tagline">시간의 오카리나 · Play the songs of Hyrule</p>
  </header>

  <main>
    <!-- ============================== Instrument ============================ -->
    <section class="instrument" aria-label="Playable ocarina">
      <!-- The blue Ocarina of Time. Holes glow as their note sounds. -->
      <svg class="ocarina" viewBox="0 0 400 290" role="img" aria-label="Ocarina of Time">
        <defs>
          <radialGradient id="bodyGrad" cx="36%" cy="28%" r="86%">
            <stop offset="0%"   stop-color="#cdf2ff" />
            <stop offset="30%"  stop-color="#67bced" />
            <stop offset="68%"  stop-color="#2c84bd" />
            <stop offset="100%" stop-color="#16517e" />
          </radialGradient>
          <radialGradient id="gloss" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="rgba(255,255,255,.85)" />
            <stop offset="55%"  stop-color="rgba(255,255,255,.18)" />
            <stop offset="100%" stop-color="rgba(255,255,255,0)" />
          </radialGradient>
          <linearGradient id="botShade" x1="0" y1="0" x2="0.3" y2="1">
            <stop offset="0%"   stop-color="rgba(8,28,52,0)" />
            <stop offset="100%" stop-color="rgba(5,20,40,.62)" />
          </linearGradient>
          <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#fff1bd" />
            <stop offset="45%"  stop-color="#e8ad3e" />
            <stop offset="100%" stop-color="#9a6717" />
          </linearGradient>
          <radialGradient id="holeDepth" cx="50%" cy="34%" r="68%">
            <stop offset="0%"   stop-color="#1d3950" />
            <stop offset="55%"  stop-color="#0a1726" />
            <stop offset="100%" stop-color="#020812" />
          </radialGradient>
          <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" />
          </filter>
        </defs>

        <!-- cast shadow -->
        <ellipse cx="220" cy="252" rx="146" ry="20" fill="rgba(0,0,0,.4)" filter="url(#softShadow)" />

        <!-- golden mouthpiece (tucked behind the body) -->
        <path d="M86,150 C54,148 32,156 26,176 C36,192 66,194 90,182 C100,176 100,160 94,152 Z"
              fill="url(#goldGrad)" stroke="#7c5512" stroke-width="2.5" stroke-linejoin="round" />
        <ellipse cx="30" cy="176" rx="6" ry="8" fill="#08151f" stroke="#5e3f0e" stroke-width="1.5" />

        <!-- ceramic body -->
        <path id="ocaBody"
              d="M78,158 C70,118 102,84 152,75 C208,64 272,68 314,99 C354,128 356,176 320,206
                 C281,237 200,241 138,223 C98,211 86,191 78,158 Z"
              fill="url(#bodyGrad)" stroke="#13405f" stroke-width="3.5" />
        <clipPath id="bodyClip"><use href="#ocaBody" /></clipPath>
        <g clip-path="url(#bodyClip)">
          <ellipse cx="330" cy="216" rx="180" ry="104" fill="url(#botShade)" />
          <ellipse cx="150" cy="112" rx="106" ry="62" fill="url(#gloss)" />
          <ellipse cx="172" cy="92" rx="46" ry="15" fill="#ffffff" opacity=".5"
                   transform="rotate(-12 172 92)" />
          <path d="M150,222 C220,236 290,228 326,200" fill="none"
                stroke="rgba(170,228,255,.5)" stroke-width="3" />
        </g>

        <!-- voicing window + subtly etched Triforce -->
        <rect x="104" y="150" width="20" height="7" rx="2" transform="rotate(-8 114 153)"
              fill="#0a1b2b" opacity=".65" />
        <g transform="translate(280 95)" fill="#dff1ff" opacity=".17">
          <polygon points="0,-11 -10,7 10,7" />
          <polygon points="-11,9 -21,27 -1,27" />
          <polygon points="11,9 1,27 21,27" />
        </g>

        <!-- finger holes: a soft rim + a deep hole that glows when its note sounds -->
        <g class="holes">
          <circle class="rim" cx="152" cy="146" r="11" />
          <circle class="hole" data-hole="left"  cx="152" cy="146" r="9" fill="url(#holeDepth)" />
          <circle class="rim" cx="202" cy="120" r="11" />
          <circle class="hole" data-hole="up"    cx="202" cy="120" r="9" fill="url(#holeDepth)" />
          <circle class="rim" cx="256" cy="118" r="11" />
          <circle class="hole" data-hole="right" cx="256" cy="118" r="9" fill="url(#holeDepth)" />
          <circle class="rim" cx="306" cy="142" r="11" />
          <circle class="hole" data-hole="down"  cx="306" cy="142" r="9" fill="url(#holeDepth)" />
          <circle class="rim" cx="216" cy="180" r="12" />
          <circle class="hole" data-hole="A"     cx="216" cy="180" r="10" fill="url(#holeDepth)" />
        </g>
      </svg>

      <!-- Button pad: C diamond + A button (N64 layout) -->
      <div class="pad" role="group" aria-label="Ocarina buttons">
        <div class="cpad">
          <button class="note-btn c up"    data-note="up"    aria-label="C-up, high D (D5)">
            <span class="arrow">▲</span><span class="key">↑</span></button>
          <button class="note-btn c left"  data-note="left"  aria-label="C-left, B4">
            <span class="arrow">◀</span><span class="key">←</span></button>
          <button class="note-btn c right" data-note="right" aria-label="C-right, A4">
            <span class="arrow">▶</span><span class="key">→</span></button>
          <button class="note-btn c down"  data-note="down"  aria-label="C-down, F4">
            <span class="arrow">▼</span><span class="key">↓</span></button>
        </div>
        <button class="note-btn a" data-note="A" aria-label="A, D4">
          <span class="arrow">A</span><span class="key">A</span></button>
      </div>

      <!-- live stream of notes played in free play -->
      <div class="echo-row">
        <span class="echo-label">♪</span>
        <div id="echo" class="echo" aria-live="off"></div>
      </div>

      <div class="controls">
        <label class="vol">🔊
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
        </label>
        <button id="stop-all" class="ghost-btn">■ Stop</button>
        <p class="hint">Use the <b>arrow keys</b> for the C-buttons and the <b>A</b> key — or tap the pad.</p>
      </div>
    </section>

    <!-- floating banner shown when a known song is recognised -->
    <div id="banner" class="banner" role="status" aria-live="polite"></div>

    <!-- ============================== Songbook ============================== -->
    <div id="songbook"></div>
  </main>

  <footer class="site-foot">
    <p>A fan-made tribute to <i>The Legend of Zelda: Ocarina of Time</i>. Built with the Web Audio API — no plugins, no downloads.</p>
  </footer>

  <script src="assets/songs.js"></script>
  <script src="assets/ocarina.js"></script>
</body>
</html>
