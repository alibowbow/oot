<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ocarina of Time — Play the Songs</title>
<meta name="description" content="A playable Ocarina of Time web app: perform the songs of Hyrule with mouse, touch, or keyboard, with sheet music for every melody." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <header class="site-head">
    <div class="triforce" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
    <h1>Ocarina of Time</h1>
    <p class="tagline">시간의 오카리나 · Play the songs of Hyrule</p>
  </header>

  <main>
    <!-- ============================== Instrument ============================ -->
    <section class="instrument" aria-label="Playable ocarina">
      <!-- The blue Ocarina of Time. Holes glow as their note sounds. -->
      <svg class="ocarina" viewBox="0 0 400 290" role="img" aria-label="Ocarina of Time">
        <defs>
          <radialGradient id="bodyGrad" cx="36%" cy="26%" r="88%">
            <stop offset="0%"   stop-color="#d6f4ff" />
            <stop offset="26%"  stop-color="#74c3ef" />
            <stop offset="64%"  stop-color="#2c84bd" />
            <stop offset="100%" stop-color="#123f63" />
          </radialGradient>
          <radialGradient id="gloss" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="rgba(255,255,255,.88)" />
            <stop offset="55%"  stop-color="rgba(255,255,255,.16)" />
            <stop offset="100%" stop-color="rgba(255,255,255,0)" />
          </radialGradient>
          <linearGradient id="botShade" x1="0" y1="0" x2="0.3" y2="1">
            <stop offset="0%"   stop-color="rgba(8,28,52,0)" />
            <stop offset="100%" stop-color="rgba(4,18,38,.66)" />
          </linearGradient>
          <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#fff4cc" />
            <stop offset="40%"  stop-color="#eab646" />
            <stop offset="100%" stop-color="#915f12" />
          </linearGradient>
          <radialGradient id="holeDepth" cx="50%" cy="32%" r="70%">
            <stop offset="0%"   stop-color="#214061" />
            <stop offset="52%"  stop-color="#0a1726" />
            <stop offset="100%" stop-color="#01060d" />
          </radialGradient>
          <radialGradient id="rimGrad" cx="38%" cy="28%" r="72%">
            <stop offset="0%"   stop-color="#bfe2f5" />
            <stop offset="48%"  stop-color="#4f9bcd" />
            <stop offset="100%" stop-color="#0d3656" />
          </radialGradient>
          <pattern id="speckle" width="27" height="27" patternUnits="userSpaceOnUse" patternTransform="rotate(9)">
            <circle cx="5"  cy="7"  r="1.1" fill="rgba(255,255,255,.10)" />
            <circle cx="18" cy="17" r="0.9" fill="rgba(7,28,52,.13)" />
            <circle cx="23" cy="4"  r="0.7" fill="rgba(255,255,255,.07)" />
            <circle cx="11" cy="22" r="0.8" fill="rgba(255,255,255,.06)" />
          </pattern>
          <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" />
          </filter>
        </defs>

        <!-- cast shadow -->
        <ellipse cx="220" cy="252" rx="146" ry="20" fill="rgba(0,0,0,.4)" filter="url(#softShadow)" />

        <!-- golden mouthpiece (tucked behind the body) -->
        <path d="M86,150 C54,148 32,156 26,176 C36,192 66,194 90,182 C100,176 100,160 94,152 Z"
              fill="url(#goldGrad)" stroke="#7c5512" stroke-width="2.5" stroke-linejoin="round" />
        <path d="M40,159 C56,153 74,154 88,160" fill="none" stroke="rgba(255,250,222,.75)"
              stroke-width="2.4" stroke-linecap="round" />
        <path d="M90,150 C95,162 95,172 90,184" fill="none" stroke="rgba(120,82,20,.6)" stroke-width="2" />
        <ellipse cx="30" cy="176" rx="6" ry="8" fill="#06121c" stroke="url(#goldGrad)" stroke-width="2" />

        <!-- ceramic body -->
        <path id="ocaBody"
              d="M78,158 C70,118 102,84 152,75 C208,64 272,68 314,99 C354,128 356,176 320,206
                 C281,237 200,241 138,223 C98,211 86,191 78,158 Z"
              fill="url(#bodyGrad)" stroke="#0f3a5c" stroke-width="3.5" />
        <clipPath id="bodyClip"><use href="#ocaBody" /></clipPath>
        <g clip-path="url(#bodyClip)">
          <ellipse cx="330" cy="216" rx="180" ry="104" fill="url(#botShade)" />
          <rect x="60" y="68" width="306" height="168" fill="url(#speckle)" />
          <ellipse cx="150" cy="112" rx="108" ry="63" fill="url(#gloss)" />
          <ellipse cx="172" cy="92" rx="46" ry="15" fill="#ffffff" opacity=".5"
                   transform="rotate(-12 172 92)" />
          <ellipse cx="134" cy="102" rx="15" ry="6.5" fill="#ffffff" opacity=".7"
                   transform="rotate(-20 134 102)" />
          <!-- top rim light + bottom reflected light -->
          <path d="M98,88 C156,73 236,72 304,98" fill="none" stroke="rgba(224,246,255,.6)" stroke-width="2.4" />
          <path d="M150,222 C220,236 290,228 326,200" fill="none" stroke="rgba(168,226,255,.5)" stroke-width="3" />
        </g>

        <!-- voicing window (sound notch) -->
        <g transform="rotate(-8 114 153)">
          <rect x="103" y="149" width="22" height="8" rx="2.5" fill="#081722" opacity=".72" />
          <rect x="103" y="149" width="22" height="3" rx="1.5" fill="#0c2638" opacity=".6" />
        </g>

        <!-- subtly etched Triforce -->
        <g transform="translate(282 94)" fill="#e6f3ff" fill-opacity=".16"
           stroke="#ffe9a8" stroke-opacity=".22" stroke-width="1">
          <polygon points="0,-11 -10,7 10,7" />
          <polygon points="-11,9 -21,27 -1,27" />
          <polygon points="11,9 1,27 21,27" />
        </g>

        <!-- finger holes: bevelled rim + deep hole that glows, with a glass glint -->
        <g class="holes">
          <circle class="rim" cx="152" cy="146" r="12.5" fill="url(#rimGrad)" />
          <circle class="hole" data-hole="left"  cx="152" cy="146" r="8.6" fill="url(#holeDepth)" />
          <circle class="glint" cx="148.5" cy="142.5" r="1.7" />
          <circle class="rim" cx="202" cy="120" r="12.5" fill="url(#rimGrad)" />
          <circle class="hole" data-hole="up"    cx="202" cy="120" r="8.6" fill="url(#holeDepth)" />
          <circle class="glint" cx="198.5" cy="116.5" r="1.7" />
          <circle class="rim" cx="256" cy="118" r="12.5" fill="url(#rimGrad)" />
          <circle class="hole" data-hole="right" cx="256" cy="118" r="8.6" fill="url(#holeDepth)" />
          <circle class="glint" cx="252.5" cy="114.5" r="1.7" />
          <circle class="rim" cx="306" cy="142" r="12.5" fill="url(#rimGrad)" />
          <circle class="hole" data-hole="down"  cx="306" cy="142" r="8.6" fill="url(#holeDepth)" />
          <circle class="glint" cx="302.5" cy="138.5" r="1.7" />
          <circle class="rim" cx="216" cy="180" r="13.5" fill="url(#rimGrad)" />
          <circle class="hole" data-hole="A"     cx="216" cy="180" r="9.6" fill="url(#holeDepth)" />
          <circle class="glint" cx="212" cy="176" r="1.9" />
        </g>
      </svg>

      <!-- Button pad: C diamond + A button (N64 layout) -->
      <div class="pad" role="group" aria-label="Ocarina buttons">
        <div class="cpad">
          <button class="note-btn c up"    data-note="up"    aria-label="C-up, high D (D5)">
            <span class="arrow">▲</span><span class="key">↑</span></button>
          <button class="note-btn c left"  data-note="left"  aria-label="C-left, B4">
            <span class="arrow">◀</span><span class="key">←</span></button>
          <button class="note-btn c right" data-note="right" aria-label="C-right, A4">
            <span class="arrow">▶</span><span class="key">→</span></button>
          <button class="note-btn c down"  data-note="down"  aria-label="C-down, F4">
            <span class="arrow">▼</span><span class="key">↓</span></button>
        </div>
        <button class="note-btn a" data-note="A" aria-label="A, D4">
          <span class="arrow">A</span><span class="key">A</span></button>
      </div>

      <!-- live stream of notes played in free play -->
      <div class="echo-row">
        <span class="echo-label">♪</span>
        <div id="echo" class="echo" aria-live="off"></div>
      </div>

      <div class="controls">
        <label class="vol">🔊
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
        </label>
        <button id="stop-all" class="ghost-btn">■ Stop</button>
        <p class="hint"><b>Hold</b> a button (or key) to sustain a note for as long as you like. Keys: <b>arrow keys</b> = C-buttons, <b>A</b> = A.</p>
      </div>
    </section>

    <!-- floating banner shown when a known song is recognised -->
    <div id="banner" class="banner" role="status" aria-live="polite"></div>

    <!-- ============================== Songbook ============================== -->
    <div id="songbook"></div>
  </main>

  <footer class="site-foot">
    <p>A fan-made tribute to <i>The Legend of Zelda: Ocarina of Time</i>. Built with the Web Audio API — no plugins, no downloads.</p>
  </footer>

  <script src="assets/songs.js"></script>
  <script src="assets/ocarina.js"></script>
</body>
</html>
